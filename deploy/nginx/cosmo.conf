# Nginx production config for kosmetologwiktoriacwik.pl.
# Install as /etc/nginx/sites-available/kosmetologwiktoriacwik.pl.

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name kosmetologwiktoriacwik.pl www.kosmetologwiktoriacwik.pl;
    return 301 https://kosmetologwiktoriacwik.pl$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.kosmetologwiktoriacwik.pl;

    ssl_certificate /etc/letsencrypt/live/kosmetologwiktoriacwik.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kosmetologwiktoriacwik.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://kosmetologwiktoriacwik.pl$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kosmetologwiktoriacwik.pl;

    ssl_certificate /etc/letsencrypt/live/kosmetologwiktoriacwik.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kosmetologwiktoriacwik.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/kosmetologwiktoriacwik.pl;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff2;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /index.html =404;
    }

    location = /spa.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /spa.html =404;
    }

    location = /private-spa.html {
        internal;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /private-spa.html =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /sw.js =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /registerSW.js =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        try_files /manifest.json =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /images/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location /icons/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /uploads/ {
        alias /home/ubuntu/cosmo-app/apps/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(admin|employee|user|auth|akademia|rezerwacja)(/|$) {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri.html $uri $uri/ /private-spa.html;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files $uri.html $uri $uri/ /spa.html;
    }
}
