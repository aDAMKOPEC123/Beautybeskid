# Nginx production config for kosmetologwiktoriacwik.pl.
# Install as /etc/nginx/sites-available/kosmetologwiktoriacwik.pl.

# cloudflared reaches this Nginx instance only through 127.0.0.1:8080.
# Trust Cloudflare's client IP header exclusively on that loopback hop; direct
# Internet clients cannot spoof it and bypass per-IP rate limits.
set_real_ip_from 127.0.0.1;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

map $http_x_forwarded_proto $cosmo_forwarded_proto {
    default $scheme;
    https https;
}

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name kosmetologwiktoriacwik.pl www.kosmetologwiktoriacwik.pl;
    return 301 https://kosmetologwiktoriacwik.pl$request_uri;
}

server {
    listen 127.0.0.1:8080;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.kosmetologwiktoriacwik.pl;

    ssl_certificate /etc/letsencrypt/live/kosmetologwiktoriacwik.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kosmetologwiktoriacwik.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    return 301 https://kosmetologwiktoriacwik.pl$request_uri;
}

server {
    listen 127.0.0.1:8080;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kosmetologwiktoriacwik.pl tunnel-test.kosmetologwiktoriacwik.pl;

    ssl_certificate /etc/letsencrypt/live/kosmetologwiktoriacwik.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kosmetologwiktoriacwik.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;

    root /var/www/kosmetologwiktoriacwik.pl;
    index index.html;
    autoindex off;
    absolute_redirect off;
    port_in_redirect off;
    error_page 404 /404.html;

    # Keep one public URL variant: no trailing slash except for the homepage.
    rewrite ^/(?!socket\.io(?:/|$)|(?:assets|images|icons|uploads)/?$|\.)(.+)/$ /$1 permanent;

    # Directory roots and hidden paths must never expose filesystem contents.
    location = /assets/ { return 404; }
    location = /images/ { return 404; }
    location = /icons/ { return 404; }
    location = /uploads/ { return 404; }
    location ~ /\.(?!well-known(?:/|$)) { return 404; }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff2;

    location = /index.html {
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files /index.html =404;
    }

    location = /spa.html {
        internal;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /spa.html =404;
    }

    location = /private-spa.html {
        internal;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /private-spa.html =404;
    }

    location = /404.html {
        internal;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /llms.txt {
        default_type text/plain;
        charset utf-8;
        try_files /llms.txt =404;
    }

    # One search intent has one canonical landing page.
    location ~ ^/kosmetolog-limanowa/?$ { return 301 https://kosmetologwiktoriacwik.pl/; }
    location ~ ^/kosmetyczka-mordarka/?$ { return 301 https://kosmetologwiktoriacwik.pl/kosmetyczka-limanowa; }
    location ~ ^/laminacja-brwi-mordarka/?$ { return 301 https://kosmetologwiktoriacwik.pl/laminacja-brwi-limanowa; }
    location ~ ^/laminacja-rzes-mordarka/?$ { return 301 https://kosmetologwiktoriacwik.pl/laminacja-rzes-limanowa; }
    location ~ ^/oprawa-oka-mordarka/?$ { return 301 https://kosmetologwiktoriacwik.pl/oprawa-oka-limanowa; }

    # Permanent redirects for legacy slugs created before Polish-character normalization.
    location ~ ^/uslugi/henna-brwi-lifting-rzs-set/?$ { return 301 https://kosmetologwiktoriacwik.pl/uslugi/henna-brwi-lifting-rzes-set; }
    location ~ ^/uslugi/lamiset-laminacja-brwi-lifting-rzs/?$ { return 301 https://kosmetologwiktoriacwik.pl/uslugi/lamiset-laminacja-brwi-lifting-rzes; }
    location ~ ^/uslugi/laminacja-brwi-z-koloryzacj/?$ { return 301 https://kosmetologwiktoriacwik.pl/uslugi/laminacja-brwi-z-koloryzacja; }
    location ~ ^/uslugi/lifting-rzs-z-koloryzacj/?$ { return 301 https://kosmetologwiktoriacwik.pl/uslugi/lifting-rzes-z-koloryzacja; }
    location ~ ^/uslugi/regulacja-brwi-woskpseta/?$ { return 301 https://kosmetologwiktoriacwik.pl/uslugi/regulacja-brwi-wosk-peseta; }
    location ~ ^/uslugi/depilacja-wsika/?$ { return 301 https://kosmetologwiktoriacwik.pl/uslugi/depilacja-wasika; }
    location ~ ^/blog/wszystko-co-musisz-wiedzie-o-laminacjii-brwii/?$ { return 301 https://kosmetologwiktoriacwik.pl/blog/laminacja-brwi-efekty-pielegnacja-przeciwwskazania; }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /sw.js =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        try_files /registerSW.js =404;
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        try_files /manifest.json =404;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /images/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location /icons/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /uploads/ {
        alias /home/ubuntu/cosmo-app/apps/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $cosmo_forwarded_proto;
    }

    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $cosmo_forwarded_proto;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $cosmo_forwarded_proto;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $cosmo_forwarded_proto;
    }

    location ~ ^/(admin|employee|user|auth|akademia|rezerwacja)(/|$) {
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri.html $uri $uri/ /private-spa.html;
    }

    # Public CMS entries are generated during deployment. Unknown slugs must be real 404s,
    # otherwise crawlers receive a soft-404 SPA response with status 200.
    location ~ ^/(uslugi|blog)/[^/]+/?$ {
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri.html $uri $uri/ =404;
    }

    location / {
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri.html $uri $uri/ =404;
    }
}
